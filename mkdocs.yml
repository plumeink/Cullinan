site_name: Cullinan Documentation
site_description: "Documentation for the Cullinan Tornado-based IoC/DI framework with type-safe parameters, pluggable model handlers, and Pydantic integration"
site_author: Plumeink

use_directory_urls: true

nav:
  - Home: README.md
  - Application Build:
    - Overview: start/index.md
    - Getting Started: getting_started.md
    - Examples: examples.md
    - Build & Run: build_run.md
  - Framework Semantics:
    - Overview: concepts/index.md
    - Framework Semantics: framework_semantics.md
    - Architecture: architecture.md
  - Engineering Practices:
    - Overview: how-to/index.md
    - Dependency Injection Guide: dependency_injection_guide.md
    - Web Runtime Guide: web_runtime_guide.md
    - DI Quick Reference: quick_reference_di.md
    - Parameter System Guide: parameter_system_guide.md
    - Testing: testing.md
    - Contributing: contributing.md
  - API Reference:
    - Overview: reference/index.md
    - API Reference Overview: api_reference.md
    - Module Reference:
      - app: modules/app.md
      - application: modules/application.md
      - core: modules/core.md
      - controller: modules/controller.md
      - service: modules/service.md
  - Internals & Extensions:
    - Overview: internals/index.md
    - Application Runtime: wiki/application_runtime.md
    - Components: wiki/components.md
    - Decorators: wiki/decorators.md
    - Injection: wiki/injection.md
    - Lifecycle: wiki/lifecycle.md
    - Middleware: wiki/middleware.md
    - Extensions: wiki/extensions.md
    - RESTful API: wiki/restful_api.md
    - Extension Development: extension_development_guide.md
    - Quick Start Extensions: quick_start_extensions.md
  - Migration & Version Notes:
    - Overview: migration/index.md
    - Runtime Consolidation: runtime_updates_v093.md
    - Migration Guide: migration_guide.md
    - Migration Guide v2: migration_guide_v2.md
    - Import Migration 0.90: import_migration_090.md

# Exclude internal documentation files from nav warnings
not_in_nav: |
  /cullinan_documentation_plan.md
  /REFACTORING_VERIFICATION_REPORT.md
  /bugfix_controller_di.md
  /templates/**
  /work/**
  /superpowers/**
  /examples/*.py
  /zh/cullinan_documentation_plan.md
  /zh/bugfix_controller_di.md
  /zh/templates/**
  /zh/work/**
  /zh/superpowers/**

# Exclude work directories from being processed entirely
exclude_docs: |
  work/
  zh/work/
  templates/
  zh/templates/

# Plugins: enable search and static-i18n for bilingual support
plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          site_url: /
        - locale: zh
          name: 中文
          build: true
          site_url: /zh/
          nav_translations:
            Home: 首页
            Application Build: 应用构建
            Framework Semantics: 框架语义
            Engineering Practices: 工程实践
            API Reference: API 参考
            Internals & Extensions: 运行时与扩展
            Migration & Version Notes: 版本迁移
            Overview: 总览
            Getting Started: 快速开始
            API Reference Overview: API 参考总览
            Architecture: 架构设计
            Runtime Consolidation: 运行时整合
            Components: 组件
            Decorators: 装饰器
            Injection: 注入
            Application Runtime: 应用运行时
            Lifecycle: 生命周期
            Middleware: 中间件
            Extensions: 扩展
            RESTful API: RESTful API
            Module Reference: 模块参考
            app: 应用
            application: 应用程序
            core: 核心
            controller: 控制器
            service: 服务
            Examples: 示例
            Runtime Consolidation Overview: 运行时整合概览
            Migration Guide: 迁移指南
            Migration Guide v2: 迁移指南 v2
            Import Migration 0.90: 0.90 导入迁移
            Dependency Injection Guide: 依赖注入指南
            Web Runtime Guide: Web Runtime 指南
            DI Quick Reference: DI 快速参考
            Parameter System Guide: 参数系统指南
            Extension Development: 扩展开发
            Quick Start Extensions: 扩展快速入门
            Build & Run: 构建与运行
            Testing: 测试
            Contributing: 贡献指南

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - tables
  - pymdownx.superfences

theme:
  name: material
  custom_dir: overrides

extra_css:
  - assets/stylesheets/version-switcher.css

extra_javascript:
  - assets/javascripts/version-switcher.js

extra:
  version:
    channel: !ENV [DOCS_CHANNEL, stable]
    current: !ENV [DOCS_CURRENT_VERSION, dev]
    stable_label: !ENV [DOCS_STABLE_VERSION, ""]
    stable_url: !ENV [DOCS_STABLE_URL, /]
    pre_label: !ENV [DOCS_PRE_VERSION, ""]
    pre_url: !ENV [DOCS_PRE_URL, /pre/]
    pre_is_available: !ENV [DOCS_PRE_AVAILABLE, "false"]
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plumeink/cullinan
